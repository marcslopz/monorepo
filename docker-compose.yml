services:
  # ── Demo app ─────────────────────────────────────────────────────────────────
  demo-backend:
    build:
      context: ./backend/demo
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./backend/demo/src:/app/src
      - ./backend/demo/tests:/app/tests
      - ./backend/demo/alembic:/app/alembic
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DEMO_DATABASE_URL: ${DEMO_DATABASE_URL:-postgresql+asyncpg://appuser:apppassword@postgres:5432/demo_db}
      DEMO_CORS_ORIGINS: ${DEMO_CORS_ORIGINS:-http://localhost:5173}
    command: uv run uvicorn src.demo.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [demo, all]

  demo-frontend:
    build:
      context: ./frontend/demo
      dockerfile: Dockerfile
    volumes:
      - ./frontend/demo/src:/app/src
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - demo-backend
    profiles: [demo, all]

  # ── Mariland app ─────────────────────────────────────────────────────────────
  mariland-backend:
    build:
      context: ./backend/mariland
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./backend/mariland/src:/app/src
      - ./backend/mariland/tests:/app/tests
      - ./backend/mariland/alembic:/app/alembic
      - ./backend/mariland/prestart.sh:/app/prestart.sh
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      MARILAND_DATABASE_URL: ${MARILAND_DATABASE_URL:-postgresql+asyncpg://appuser:apppassword@postgres:5432/mariland_db}
      MARILAND_CORS_ORIGINS: ${MARILAND_CORS_ORIGINS:-http://localhost:5174}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      JINA_API_KEY: ${JINA_API_KEY:-}
      SCRAPINGBEE_API_KEY: ${SCRAPINGBEE_API_KEY:-}
    command: sh prestart.sh
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [mariland, all]

  mariland-frontend:
    build:
      context: ./frontend/mariland
      dockerfile: Dockerfile
    volumes:
      - ./frontend/mariland/src:/app/src
    ports:
      - "5174:5174"
    env_file:
      - .env
    depends_on:
      - mariland-backend
    profiles: [mariland, all]

  # ── Shared infrastructure ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppassword}
      POSTGRES_DB: ${DEMO_POSTGRES_DB:-demo_db}
    ports:
      - "5432:5432"
    volumes:
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser} -d ${DEMO_POSTGRES_DB:-demo_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

