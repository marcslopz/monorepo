services:
  # ── Demo app ─────────────────────────────────────────────────────────────────
  demo-backend:
    build:
      context: ./backend/demo
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./backend/demo:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DEMO_DATABASE_URL:-postgresql+asyncpg://appuser:apppassword@postgres:5432/demo_db}
      CORS_ORIGINS: ${DEMO_CORS_ORIGINS:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles: [demo, all]

  demo-frontend:
    build:
      context: ./frontend/demo
      dockerfile: Dockerfile
    volumes:
      - ./frontend/demo:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - demo-backend
    profiles: [demo, all]

  # ── Shared infrastructure ─────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-appuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apppassword}
      POSTGRES_DB: ${DEMO_POSTGRES_DB:-demo_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-appuser}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
