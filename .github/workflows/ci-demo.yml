name: CI — demo

on:
  push:
    branches: [main]
    paths:
      - 'backend/demo/**'
      - 'backend/shared/**'
      - 'frontend/demo/**'
      - 'frontend/shared/**'
      - '.github/workflows/ci-demo.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/demo/**'
      - 'backend/shared/**'
      - 'frontend/demo/**'
      - 'frontend/shared/**'
      - '.github/workflows/ci-demo.yml'

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppassword
          POSTGRES_DB: demo_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend/demo
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check src tests
      - name: Type check
        run: uv run mypy -p app
      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://appuser:apppassword@localhost:5432/demo_db
          JWT_SECRET: test-secret
          JWT_ALGORITHM: HS256
          JWT_EXPIRE_MINUTES: 60
          ENVIRONMENT: test
          CORS_ORIGINS: http://localhost:5173
        run: uv run pytest tests/ -v

  frontend:
    name: Frontend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/demo
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/demo/pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test run
