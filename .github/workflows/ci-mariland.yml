name: CI — mariland

on:
  push:
    branches: [main]
    paths:
      - 'backend/mariland/**'
      - 'frontend/mariland/**'
      - '.github/workflows/ci-mariland.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/mariland/**'
      - 'frontend/mariland/**'
      - '.github/workflows/ci-mariland.yml'

jobs:
  backend:
    name: Backend — lint & test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppassword
          POSTGRES_DB: mariland_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: backend/mariland
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: latest
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Lint
        run: uv run ruff check src tests
      - name: Type check
        run: uv run mypy -p mariland
      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://appuser:apppassword@localhost:5432/mariland_db
        run: uv run alembic upgrade head
      - name: Test
        env:
          DATABASE_URL: postgresql+asyncpg://appuser:apppassword@localhost:5432/mariland_db
          ENVIRONMENT: test
          CORS_ORIGINS: http://localhost:5174
        run: uv run pytest tests/ -v

  frontend:
    name: Frontend — lint & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/mariland
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: pnpm install --ignore-workspace
      - name: Lint
        run: pnpm lint
      - name: Test
        run: pnpm test run
